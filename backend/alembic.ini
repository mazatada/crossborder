# alembic.ini
[alembic]
script_location = migrations
sqlalchemy.url = postgresql+psycopg2://cb:cbpass@db:5432/cbdb


[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(message)s
datefmt = %H:%M:%S

