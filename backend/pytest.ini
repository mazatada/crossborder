[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
addopts = -q
# Coverage settings (uncomment after installing pytest-cov)
# addopts = -q --cov=app --cov-report=term-missing --cov-report=html --cov-fail-under=80
markers =
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    ultracite: knowledge guard / regulation watch tests
    security: security-related tests (DoS, injection, auth)
    postgres: tests requiring PostgreSQL (skipped on SQLite)
