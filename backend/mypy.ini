[mypy]
# Global settings
python_version = 3.9
warn_return_any = False
warn_unused_configs = True
files = app, tests
exclude = env/
ignore_missing_imports = False
disallow_untyped_defs = False
no_implicit_optional = False

# Per-module settings
[mypy-reportlab.*]
ignore_missing_imports = True

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-flask_cors.*]
ignore_missing_imports = True
