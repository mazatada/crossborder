services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-cb}
      POSTGRES_PASSWORD: ${DB_PASS:-cbpass}
      POSTGRES_DB: ${DB_NAME:-cbdb}
    ports: ["5432:5432"]
    volumes: [db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER:-cb} -d ${DB_NAME:-cbdb} -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      DB_URL: postgresql+psycopg://cb:cbpass@db:5432/cbdb
      SECRET_KEY: devsecret
    volumes:
      - ./backend:/app
    ports:
      - "5001:5000"
    command: >
      sh -lc "flask --app app.factory run --host=0.0.0.0 --port=5000 --debug"

volumes:
  db_data: {}
