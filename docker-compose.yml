services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cb
      POSTGRES_PASSWORD: cbpass
      POSTGRES_DB: cbdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cb -d cbdb"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    image: crossborder-backend:latest
    environment:
      # Flask 側がこのどちらかを読む実装。片方だけでもOK
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://cb:cbpass@db:5432/cbdb
      DB_URL: postgresql+psycopg2://cb:cbpass@db:5432/cbdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "5001:5000"

  worker:
    image: crossborder-backend:latest
    command: ["python", "-m", "app.jobs.cli"]
    environment:
      MODE: worker
      DB_URL: postgresql+psycopg2://cb:cbpass@db:5432/cbdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  scheduler:
    image: crossborder-backend:latest
    command: ["python", "-m", "app.jobs.cli"]
    environment:
      DB_URL: postgresql+psycopg2://cb:cbpass@db:5432/cbdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
