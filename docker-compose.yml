services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI}
      API_KEYS=dev123: # 環境変数でAPIキーを設定

    ports:
      - "5001:5000"
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request;urllib.request.urlopen('http://localhost:5000/v1/health').read();print('ok')\nPY"]
      interval: 10s
      timeout: 3s
      retries: 6


volumes:
  db_data:

