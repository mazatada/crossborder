services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cb
      POSTGRES_PASSWORD: cbpass
      POSTGRES_DB: cbdb
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cb -d cbdb" ]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "65473:5432"
    env_file: .env

  redis:
    image: redis:7-alpine
    ports:
      - "65480:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    # backend でビルド → そのイメージを worker/scheduler が使います
    build: ./backend
    image: crossborder-backend:latest
    env_file: .env
    environment:
      # ドライバ名はインストール済みに合わせて：psycopg か psycopg2 のどちらかに統一
      # すでに .env で postgresql+psycopg を使っているなら、こちらも合わせるのが安全
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://cb:cbpass@db:5432/cbdb
      DB_URL: postgresql+psycopg://cb:cbpass@db:5432/cbdb
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./docs:/docs
    ports:
      - "65001:5000"

  worker:
    image: crossborder-backend:latest
    env_file: .env
    environment:
      PYTHONPATH: /app
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://cb:cbpass@db:5432/cbdb # ← 追加
      DB_URL: postgresql+psycopg://cb:cbpass@db:5432/cbdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # entrypoint を上書きして CLI を直接起動（entrypoint.sh を経由しない）
    entrypoint: [ "python", "-m", "app.jobs.cli", "--mode", "worker" ]

  scheduler:
    image: crossborder-backend:latest
    env_file: .env
    environment:
      PYTHONPATH: /app
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://cb:cbpass@db:5432/cbdb # ← 追加
      DB_URL: postgresql+psycopg://cb:cbpass@db:5432/cbdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    entrypoint: [ "python", "-m", "app.jobs.cli", "--mode", "scheduler" ]

  pytest:
    build: ./backend
    image: crossborder-backend:latest
    env_file: .env
    environment:
      PYTHONPATH: /app
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://cb:cbpass@db:5432/cbdb
      DB_URL: postgresql+psycopg://cb:cbpass@db:5432/cbdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    entrypoint: [ "python", "-m", "pytest" ]
    command: [ "-m", "unit or integration" ]
    restart: "no"

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.1-focal
    working_dir: /app/frontend
    env_file: .env
    environment:
      PLAYWRIGHT_BASE_URL: http://backend:5000
      # Playwrightのブラウザ依存キャッシュを共有しない簡易構成。必要なら volume 化を検討。
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      - frontend-node-modules:/app/frontend/node_modules
      - playwright-cache:/ms-playwright
    entrypoint: [ "/bin/bash", "-lc" ]
    command:
      - |
        if [ ! -d node_modules/@playwright/test ]; then
          npm ci --prefer-offline --no-progress
        fi
        npx playwright test --project=api

volumes:
  frontend-node-modules:
  playwright-cache:
