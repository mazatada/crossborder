name: Knowledge Guard

on:
  schedule:
    - cron: "0 1 * * *" # 01:00 UTC nightly
  workflow_dispatch:

jobs:
  ultracite-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: crossborder-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run ultracite guard
        run: docker compose run --rm backend python -m app.watchdog.run

      - name: Upload Watchdog Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchdog-reports
          path: docs/regulations/reports/
          retention-days: 30

      - name: Teardown Docker services
        if: always()
        run: docker compose down
