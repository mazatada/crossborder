name: CD - Deploy to Environment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment || 'staging' }}
    concurrency:
      group: deploy-${{ github.event.inputs.environment || 'staging' }}
      cancel-in-progress: false

    permissions:
      contents: read
      actions: write
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/crossborder-backend:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/crossborder-backend:${{ github.event.inputs.environment || 'staging' }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ secrets.REGISTRY_URL }}/crossborder-backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push backend image
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/crossborder-backend:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_URL }}/crossborder-backend:${{ github.event.inputs.environment || 'staging' }}-${{ github.sha }}
      
      - name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
        run: |
          # Deploy using your preferred method (Docker Compose, Kubernetes, etc.)
          echo "Deploying to ${{ github.event.inputs.environment || 'staging' }}..."
          # Example: docker compose pull && docker compose up -d

      - name: Run database migrations
        run: |
          # NOTE: Migrations must remain backward-compatible (expand/contract).
          # Run migrations after deployment so the target container exists.
          echo "Running migrations..."
          # docker compose exec backend alembic upgrade head
      
      - name: Health check
        run: |
          echo "Waiting for service to be ready..."
          for i in {1..30}; do
            if curl -f ${{ secrets.SERVICE_URL }}/health > /dev/null 2>&1; then
              echo "Service is healthy!"
              exit 0
            fi
            echo "Attempt $i: Service not ready yet..."
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1

      - name: Record last known good image tag
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const envName = '${{ github.event.inputs.environment || 'staging' }}';
            const varName = `LAST_GOOD_TAG_${envName.toUpperCase()}`;
            const value = `${{ github.event.inputs.environment || 'staging' }}-${{ github.sha }}`;
            await github.rest.actions.createOrUpdateRepoVariable({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: varName,
              value
            });
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment successful!"
          # Add notification to Slack, Discord, etc.
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          # Pull and deploy last known good tag for this environment.
          # LAST_GOOD_TAG_<ENV> is stored as a repo variable.
          # Example: docker compose pull && docker compose up -d
