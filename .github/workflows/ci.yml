name: CI

on:
  push:
    branches:
      - main
      - master
      - feat/** # keep CI active on feature branches
      - fix/**  # keep CI active on fix branches
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  dockerized-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: crossborder-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Python lint (ruff)
        run: docker compose run --rm --entrypoint ruff backend check app tests

      - name: Python style (black)
        run: docker compose run --rm --entrypoint black backend --check app tests

      - name: Python type check (mypy)
        run: docker compose run --rm --entrypoint mypy backend app tests

      - name: Generate ERD and DDL
        run: docker compose run --rm -v ${{ github.workspace }}/scripts:/app/scripts backend python scripts/generate_erd.py

      - name: Validate OpenAPI spec
        run: |
          if [ -f app/openapi.yaml ]; then
            echo "OpenAPI spec found"
            # Add OpenAPI validation here if needed
          elif [ -f backend/openapi.yaml ]; then
             echo "OpenAPI spec found in backend"
          else
            echo "Warning: OpenAPI spec not found"
          fi

      - name: Run pytest (unit/integration - SQLite)
        run: docker compose run --rm pytest -m "not postgres"

      - name: Run pytest (PostgreSQL-dependent tests)
        run: docker compose run --rm pytest -m "postgres"

      - name: Run Playwright API smoke tests (dockerized)
        run: docker compose run --rm playwright

      - name: Show backend logs (debug)
        if: always()
        run: docker compose logs backend --tail 100

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

      - name: Upload Generated Docs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: |
            backend/erd.md
            backend/schema.sql
          retention-days: 30

      - name: Stop Docker services
        if: always()
        run: docker compose down
