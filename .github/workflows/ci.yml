name: CI

on:
  push:
    branches:
      - main
      - master
      - feat/** # keep CI active on feature branches
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  dockerized-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: crossborder-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Python lint (ruff)
        run: docker compose run --rm --entrypoint ruff backend check backend backend/tests

      - name: Python style (black)
        run: docker compose run --rm --entrypoint black backend --check backend

      - name: Python type check (mypy)
        run: docker compose run --rm --entrypoint mypy backend app

      - name: Run pytest (unit/integration)
        run: docker compose run --rm pytest

      - name: Run Playwright API smoke tests (dockerized)
        run: docker compose run --rm playwright

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

      - name: Stop Docker services
        if: always()
        run: docker compose down
